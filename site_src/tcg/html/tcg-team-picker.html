<div class="tcg-field">
  <label>Your Team</label>
  <div class="tcg-team">{{TEAM_SELECTS}}</div>
</div>
<div class="tcg-field">
  <label>Browse Characters</label>
  <p class="tcg-roster-hint">Click a card to view skills, abilities, and stats.</p>
  <div class="tcg-roster-grid" id="tcg-roster-grid"></div>
</div>
<div class="tcg-field">
  <label>Deck</label>
  <div class="tcg-deck-row">
    <span class="tcg-badge {{DECK_BADGE_CLASS}}">{{DECK_BADGE_TEXT}}</span>
    <a href="/games/tcg/deck" class="tcg-btn">[ edit deck ]</a>
  </div>
  {{DECK_WARN}}
</div>
<div class="tcg-create-row">
  <button id="{{SUBMIT_ID}}" type="button" class="tcg-btn" {{SUBMIT_DISABLED}}>{{SUBMIT_LABEL}}</button>
</div>
<div id="{{ERROR_ID}}" class="tcg-err" aria-live="polite"></div>
