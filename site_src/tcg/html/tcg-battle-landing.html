<h1 class="text-center tcg-page-title">TCG Battle</h1>
<p class="text-center text-fog-300 tcg-page-lead">Pick a team of three, then battle a friend or practice solo.</p>
<div class="tcg-wrap">
  <div class="tcg-panel">
    <p class="tcg-subtitle">Create a Battle</p>
    <div class="tcg-field">
      <label>Mode</label>
      <div class="tcg-modes" id="tcg-modes">
        <button type="button" class="tcg-mode active" data-mode="pvp">PvP (invite link)</button>
        <button type="button" class="tcg-mode" data-mode="solo">Solo practice</button>
      </div>
    </div>
    {{TEAM_PICKER}}
  </div>
  <div class="tcg-panel">
    <p class="tcg-subtitle">Your Active Battles</p>
    {{ACTIVE_ROOMS}}
  </div>
</div>
