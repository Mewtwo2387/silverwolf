<!doctype html>
<html lang="en" data-theme="blackout">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Silverwolf — Magic 8-Ball</title>
  <link rel="stylesheet" href="../styles.css" />
  <style>
    html, body { overflow-x: clip; background-color: #020308; color-scheme: dark; }
    main { padding-bottom: calc(5.5rem + env(safe-area-inset-bottom)); }
    .eightball-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
      margin-top: 2rem;
    }
    .eightball-sphere {
      width: 280px;
      height: 280px;
      background: radial-gradient(circle at 30% 30%, #444, #111);
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      box-shadow: 0 10px 30px rgba(0,0,0,0.6);
    }
    .eightball-inner {
      width: 140px;
      height: 140px;
      background: #050505;
      border: 4px solid #1a1a1a;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 1rem;
      color: #00ffff;
      font-size: 0.9rem;
      font-weight: bold;
      text-transform: uppercase;
      transition: color 0.3s;
    }
    .eightball-inner.savage {
      color: #ff0000;
    }
    .input-group {
      display: flex;
      gap: 0.5rem;
      width: 100%;
      max-width: 500px;
    }
    .input-group input {
      flex: 1;
      background: var(--ink-800);
      border: 1px solid var(--ink-600);
      border-radius: 4px;
      padding: 0.6rem 1rem;
      color: var(--fog-100);
    }
    @keyframes shake {
      0% { transform: translate(0, 0); }
      10% { transform: translate(-5px, -5px); }
      20% { transform: translate(5px, 5px); }
      30% { transform: translate(-5px, 5px); }
      40% { transform: translate(5px, -5px); }
      50% { transform: translate(-5px, -5px); }
      60% { transform: translate(5px, 5px); }
      70% { transform: translate(-5px, 5px); }
      80% { transform: translate(5px, -5px); }
      90% { transform: translate(-5px, -5px); }
      100% { transform: translate(0, 0); }
    }
    .shaking {
      animation: shake 0.5s infinite;
    }
  </style>
</head>
<body class="font-sans bg-ink-900 text-fog-100 min-h-screen flex flex-col scanlines cyber-grid">
  <!-- Top bar emulator -->
  <nav id="site-nav" class="nav-surface font-mono">
    <div class="nav-window-header flex items-center justify-between px-[1.5rem] py-2 border-b border-[rgba(34,211,255,0.12)] select-none">
      <div class="flex items-center gap-1.5">
        <a href="../index.html" class="text-accent hover:text-accent-light no-underline mr-2 font-bold">&lt; Back</a>
        <span class="text-[0.7rem] font-semibold text-accent opacity-75 tracking-widest font-mono">GAME.8BALL.EXE</span>
      </div>
      <div class="flex items-center gap-2">
        <span class="status-led status-led-red w-1.5 h-1.5"></span>
        <span class="text-[#EF4444] text-[0.7rem] font-bold tracking-widest font-mono">[OFFLINE]</span>
      </div>
    </div>
  </nav>

  <main class="flex-1 w-full max-w-[1100px] mx-auto py-8 px-[clamp(1rem,4vw,3rem)]">
    <h1 class="text-center text-3xl font-extrabold text-white">Magic 8-Ball</h1>
    <div class="eightball-container">
      <div id="eightball-sphere" class="eightball-sphere">
        <div id="eightball-text" class="eightball-inner">ASK A QUESTION</div>
      </div>
      <div class="input-group">
        <input type="text" id="question-input" aria-label="Ask a yes or no question" placeholder="Will I ever touch grass?" />
        <button id="ask-btn" class="btn-accent btn-sm px-6 py-2 rounded font-bold">Ask</button>
      </div>
      <p class="text-fog-400 text-sm mt-4 text-center">The combined magic 8-ball sees all.</p>
    </div>
  </main>

  <!-- Mobile bottom dock -->
  <div id="nav-mobile" role="navigation" aria-label="Mobile navigation" style="display:flex">
    <a href="../index.html" class="nav-link no-underline active" aria-label="Games">
      <svg viewBox="0 0 20 20" fill="currentColor" aria-hidden="true" class="w-6 h-6">
        <path d="M15.9 5.5C15.3 4.5 14.2 4 13 4H7c-1.2 0-2.3.5-2.9 1.5-2.3 3.5-2.8 8.8-1.2 9.9 1.6 1.1 5.2-3.7 7.1-3.7s5.4 4.8 7.1 3.7c1.6-1.1 1.1-6.4-1.2-9.9zM8 9H7v1H6V9H5V8h1V7h1v1h1v1h1v1h1v1zm5.4.5c0 .5-.4.9-.9.9s-.9-.4-.9-.9.4-.9.9-.9.9.4.9.9zm1.9-2c0 .5-.4.9-.9.9s-.9-.4-.9-.9.4-.9.9-.9.9.4.9.9z"/>
      </svg>
      <span class="label">Games</span>
    </a>
  </div>

  <script>
    (() => {
      const normal = [
        "Yes, definitely.",
        "Ask again later.",
        "Absolutely!",
        "Don't count on it.",
        "Yes, in due time.",
        "My sources say no.",
        "Outlook good.",
        "Very doubtful.",
        "It is certain.",
        "Yes.",
        "Cannot predict now.",
        "As I see it, yes.",
        "Most likely.",
        "No way.",
        "The future is unclear.",
        "Yes, but don't rush it.",
        "It is decidedly so.",
        "You may rely on it.",
        "Ask me again later.",
        "No."
      ];
      const savage = [
        "Don't bother me with your existential dread. Ask Google.",
        "Sure, I can predict the future. You'll still be single.",
        "The answer is clear... but also irrelevant because you'll mess it up anyway.",
        "My sources say the answer depends on how much caffeine you've had. Hint: more is better.",
        "Honestly, who cares? Focus on something more productive, like criticizing bad memes.",
        "Why waste my magic on your trivial problems? Go consult a therapist... or Reddit.",
        "If you need a magic ball to make decisions, your life choices are already a disaster.",
        "The answer is 42. But seriously, that doesn't actually mean anything.",
        "Here's a life tip: Sometimes, the answer is just 'no'. Deal with it.",
        "The future is uncertain, just like your fashion sense.",
        "Look, consulting a magical sphere won't solve your problems. Adult a little.",
        "Maybe if you phrased your question less like a toddler, I'd give a serious answer.",
        "The answer is 'maybe'. Because frankly, I don't even understand your question.",
        "Let the free market decide. Just kidding, the market is rigged, you'll lose.",
        "The answer lies within... yourself. But also within my code, which is way more interesting.",
        "Sure, the future looks bright. For me, not necessarily for you."
      ];

      const btn = document.getElementById('ask-btn');
      const input = document.getElementById('question-input');
      const inner = document.getElementById('eightball-text');
      const sphere = document.getElementById('eightball-sphere');

      let animating = false;

      const ask = () => {
        if (animating || !input.value.trim()) return;
        animating = true;
        btn.disabled = true;
        sphere.classList.add('shaking');
        inner.textContent = '...';

        const isSavage = Math.random() < 0.2;
        const responses = isSavage ? savage : normal;
        if (isSavage) inner.classList.add('savage');
        else inner.classList.remove('savage');

        let count = 0;
        const maxCount = 20;
        
        const tick = () => {
          const pool = Math.random() < 0.5 ? normal : savage;
          inner.textContent = pool[Math.floor(Math.random() * pool.length)];
          count++;
          
          if (count < maxCount) {
            const delay = 80 + (count * 10);
            setTimeout(tick, delay);
          } else {
            sphere.classList.remove('shaking');
            const finalAnswer = responses[Math.floor(Math.random() * responses.length)];
            inner.textContent = finalAnswer;
            animating = false;
            btn.disabled = false;
          }
        };
        
        setTimeout(tick, 80);
      };

      btn.addEventListener('click', ask);
      input.addEventListener('keypress', (e) => { if (e.key === 'Enter') ask(); });
    })();
  </script>
</body>
</html>
